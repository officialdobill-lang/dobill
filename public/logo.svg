<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 115 250 250" width="100%" height="100%">
  <!-- Beautiful, Crisp Vector Recreation of the Official Do Bill Logo (Icon Only) -->
  <g id="logo-symbol">
    <!-- 1. The White Receipt/Document Page (Centered-Top, placed in the background) -->
    <path d="M 210 120 
             H 290 
             L 320 150 
             V 260 
             H 210 
             Z" 
          fill="#ffffff" 
          stroke="#101F42" 
          stroke-width="8" 
          stroke-linejoin="round" />
          
    <!-- Folding line on the top-right corner of the paper -->
    <path d="M 290 120 
             V 150 
             H 320" 
          fill="none" 
          stroke="#101F42" 
          stroke-width="8" 
          stroke-linejoin="round" />
          
    <!-- Horizontal text lines on the receipt document -->
    <line x1="230" y1="180" x2="300" y2="180" stroke="#101F42" stroke-width="6" stroke-linecap="round" />
    <line x1="230" y1="200" x2="290" y2="200" stroke="#101F42" stroke-width="6" stroke-linecap="round" />
    <line x1="230" y1="220" x2="300" y2="220" stroke="#101F42" stroke-width="6" stroke-linecap="round" />
    <line x1="230" y1="240" x2="275" y2="240" stroke="#101F42" stroke-width="6" stroke-linecap="round" />

    <!-- 2. The Letter "B" (Emerald Green, on the right, drawn behind the "D" but overlapping) -->
    <!-- Green color is an elegant emerald green: #059669 -->
    <path d="M 240 230 
             H 295 
             A 32.5 32.5 0 0 1 327.5 262.5 
             A 32.5 32.5 0 0 1 295 295 
             H 240 
             Z" 
          fill="#059669" />
          
    <path d="M 240 295 
             H 300 
             A 32.5 32.5 0 0 1 332.5 327.5 
             A 32.5 32.5 0 0 1 300 360 
             H 240 
             Z" 
          fill="#059669" />
          
    <!-- White counter loops of the "B" to make it pop -->
    <circle cx="280" cy="262.5" r="14" fill="#ffffff" />
    <circle cx="285" cy="327.5" r="14" fill="#ffffff" />
    
    <!-- White horizontal accent line in the bottom loop of B to match the original logo styling -->
    <rect x="255" y="322.5" width="45" height="10" rx="5" fill="#ffffff" />

    <!-- 3. The Letter "D" (Deep Navy Blue, in the foreground, on the left) -->
    <!-- Navy color is a sleek corporate deep blue: #101F42 -->
    <path d="M 145 220 
             H 205 
             A 70 70 0 0 1 275 290 
             A 70 70 0 0 1 205 360 
             H 145 
             Z" 
          fill="#101F42" />
          
    <!-- White inner hollow of the letter "D" -->
    <path d="M 195 250 
             H 205 
             A 40 40 0 0 1 245 290 
             A 40 40 0 0 1 205 330 
             H 195 
             Z" 
          fill="#ffffff" />
          
    <!-- Document scroll detail / smiling face design within the D's counter -->
    <path d="M 205 272 
             V 302 
             A 8 8 0 0 0 213 310" 
          fill="none" 
          stroke="#101F42" 
          stroke-width="6" 
          stroke-linecap="round" />
          
    <!-- Second small eye/dot detail representing active automated invoice processing -->
    <circle cx="225" cy="285" r="4.5" fill="#101F42" />
  </g>
</svg>
