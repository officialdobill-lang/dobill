<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do Bill POS</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <link rel="apple-touch-icon" href="/src/assets/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[ServiceWorker] Registered successfully:', reg.scope))
            .catch(err => console.error('[ServiceWorker] Registration failed:', err));
        });
      }
    </script>
    <script>
      (function() {
        // Intercept addEventListener to filter out any "Script error." events before they reach other listeners
        (function() {
          var originalAdd = window.addEventListener;
          var protoAdd = Window.prototype ? Window.prototype.addEventListener : null;
          var targetProtoAdd = EventTarget.prototype ? EventTarget.prototype.addEventListener : null;

          function wrapAddEventListener(original) {
            if (!original) return original;
            return function(type, listener, options) {
              if ((type === 'error' || type === 'unhandledrejection') && typeof listener === 'function') {
                var wrapped = function(event) {
                  if (event) {
                    var msg = (event.message || '').toString().toLowerCase();
                    var errStack = (event.error && event.error.stack || '').toString().toLowerCase();
                    var errMsg = (event.error && event.error.message || '').toString().toLowerCase();
                    var reasonMsg = (event.reason && (event.reason.message || event.reason) || '').toString().toLowerCase();
                    var isScriptError = (
                      msg.indexOf('script error') > -1 || 
                      errMsg.indexOf('script error') > -1 || 
                      errStack.indexOf('script error') > -1 ||
                      reasonMsg.indexOf('script error') > -1
                    );

                    if (isScriptError) {
                      try { event.preventDefault(); } catch(e) {}
                      try { event.stopPropagation(); } catch(e) {}
                      try { event.stopImmediatePropagation(); } catch(e) {}
                      return; // Completely block "Script error." propagation
                    }
                  }
                  return listener.call(this, event);
                };
                wrapped._original = listener;
                return original.call(this, type, wrapped, options);
              }
              return original.apply(this, arguments);
            };
          }

          if (originalAdd) {
            window.addEventListener = wrapAddEventListener(originalAdd);
          }
          if (protoAdd) {
            Window.prototype.addEventListener = wrapAddEventListener(protoAdd);
          }
          if (targetProtoAdd) {
            EventTarget.prototype.addEventListener = wrapAddEventListener(targetProtoAdd);
          }
        })();

        // Make window.fetch writable to prevent Capacitor / native bridge errors on read-only window.fetch
        (function() {
          var originalFetch = window.fetch;
          if (!originalFetch) return;
          var currentFetch = originalFetch;

          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              }
            });
          } catch (e) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                configurable: true,
                enumerable: true,
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                }
              });
            } catch (ex) {
              console.warn("Could not redefine window.fetch or Window.prototype.fetch:", ex);
            }
          }
        })();

        // Safely intercept direct assignments to window.onerror and window.onunhandledrejection
        (function() {
          var currentOnerror = null;
          try {
            Object.defineProperty(window, 'onerror', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentOnerror;
              },
              set: function(val) {
                if (typeof val === 'function') {
                  currentOnerror = function(message, source, lineno, colno, error) {
                    var msg = (message || '').toString().toLowerCase();
                    var errStack = (error && error.stack || '').toString().toLowerCase();
                    var errMsg = (error && error.message || '').toString().toLowerCase();
                    if (msg.indexOf('script error') > -1 || errMsg.indexOf('script error') > -1 || errStack.indexOf('script error') > -1) {
                      return true; // Return true to prevent default propagation
                    }
                    return val.apply(this, arguments);
                  };
                } else {
                  currentOnerror = val;
                }
              }
            });
          } catch (e) {
            console.warn("Could not override window.onerror setter:", e);
          }

          var currentOnunhandled = null;
          try {
            Object.defineProperty(window, 'onunhandledrejection', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentOnunhandled;
              },
              set: function(val) {
                if (typeof val === 'function') {
                  currentOnunhandled = function(event) {
                    if (event) {
                      var reason = event.reason || {};
                      var stack = (reason.stack || '').toString().toLowerCase();
                      var message = (reason.message || reason || '').toString().toLowerCase();
                      if (message.indexOf('script error') > -1 || stack.indexOf('script error') > -1) {
                        try { event.preventDefault(); } catch(ex) {}
                        try { event.stopPropagation(); } catch(ex) {}
                        try { event.stopImmediatePropagation(); } catch(ex) {}
                        return;
                      }
                    }
                    return val.apply(this, arguments);
                  };
                } else {
                  currentOnunhandled = val;
                }
              }
            });
          } catch (e) {
            console.warn("Could not override window.onunhandledrejection setter:", e);
          }
        })();

        var capturedErrors = [];

        // Wrap console.error early to completely filter out any cross-origin "Script error." messages
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var argStr = '';
          try {
            argStr = JSON.stringify(args).toLowerCase();
          } catch(e) {
            try {
              argStr = args.join(' ').toLowerCase();
            } catch(ex) {
              argStr = '';
            }
          }
          if (argStr.indexOf('script error') > -1) {
            return; // Ignore completely
          }
          originalConsoleError.apply(console, arguments);
        };

        // Catch and silence external/restricted "Script error." immediately at the window.onerror level
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = (message || '').toString().toLowerCase();
          var errStack = (error && error.stack || '').toString().toLowerCase();
          var errMsg = (error && error.message || '').toString().toLowerCase();
          
          if (msg.indexOf('script error') > -1 || errMsg.indexOf('script error') > -1 || errStack.indexOf('script error') > -1) {
            return true; // Return true prevents default firing (stays out of browser console)
          }

          var isInternal = false;
          if (source) {
            var f = source.toLowerCase();
            var origin = window.location.origin.toLowerCase();
            isInternal = (
              f.indexOf('src/') > -1 || 
              f.indexOf(origin) > -1 || 
              f.indexOf('localhost') > -1 || 
              f.indexOf('127.0.0.1') > -1 || 
              f.indexOf('main.tsx') > -1 || 
              f.indexOf('/assets/') > -1
            );
          } else if (errStack) {
            isInternal = (
              errStack.indexOf('src/') > -1 ||
              errStack.indexOf('main.tsx') > -1 ||
              errStack.indexOf('localhost') > -1 ||
              errStack.indexOf('127.0.0.1') > -1
            );
          }

          if (!isInternal) {
            return true; // Silence non-first-party scripts, extensions, or anonymous errors
          }
          return false; // let any genuine first-party app errors proceed
        };

        function showDiagnosticOverlay(errData) {
          // Check if overlay already exists
          if (document.getElementById('diagnostic-crash-overlay')) return;

          var overlay = document.createElement('div');
          overlay.id = 'diagnostic-crash-overlay';
          overlay.style.position = 'fixed';
          overlay.style.top = '0';
          overlay.style.left = '0';
          overlay.style.width = '100vw';
          overlay.style.height = '100vh';
          overlay.style.backgroundColor = 'rgba(15, 23, 42, 0.95)';
          overlay.style.color = '#f8fafc';
          overlay.style.zIndex = '2147483647';
          overlay.style.fontFamily = 'Inter, system-ui, -apple-system, sans-serif';
          overlay.style.padding = '24px';
          overlay.style.boxSizing = 'border-box';
          overlay.style.overflowY = 'auto';
          overlay.style.display = 'flex';
          overlay.style.flexDirection = 'column';
          overlay.style.justifyContent = 'center';
          overlay.style.alignItems = 'center';

          var card = document.createElement('div');
          card.style.maxWidth = '680px';
          card.style.width = '100%';
          card.style.backgroundColor = '#1e293b';
          card.style.borderRadius = '12px';
          card.style.border = '1px solid #334155';
          card.style.padding = '32px';
          card.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.5)';
          card.style.boxSizing = 'border-box';

          // Heading
          var title = document.createElement('h1');
          title.style.margin = '0 0 12px 0';
          title.style.fontSize = '22px';
          title.style.fontWeight = '700';
          title.style.color = '#f43f5e';
          title.style.display = 'flex';
          title.style.alignItems = 'center';
          title.style.gap = '8px';
          title.innerHTML = 'âš ï¸  Application Launch Exception';
          card.appendChild(title);

          // Subtitle
          var subtitle = document.createElement('p');
          subtitle.style.margin = '0 0 20px 0';
          subtitle.style.fontSize = '14px';
          subtitle.style.lineHeight = '1.6';
          subtitle.style.color = '#94a3b8';
          subtitle.innerText = 'A runtime crash has occurred during module load or initial page execution. This often occurs due to browser sandbox restrictions in iframe previews.';
          card.appendChild(subtitle);

          // Error Container
          var errBox = document.createElement('div');
          errBox.style.backgroundColor = '#0f172a';
          errBox.style.borderLeft = '4px solid #f43f5e';
          errBox.style.padding = '16px';
          errBox.style.borderRadius = '6px';
          errBox.style.marginBottom = '24px';
          errBox.style.boxSizing = 'border-box';

          var errTitle = document.createElement('div');
          errTitle.style.fontWeight = '600';
          errTitle.style.fontSize = '14px';
          errTitle.style.color = '#fda4af';
          errTitle.style.marginBottom = '6px';
          errTitle.innerText = errData.message || 'Script Error / Unknown Exception';
          errBox.appendChild(errTitle);

          if (errData.filename) {
            var errLoc = document.createElement('div');
            errLoc.style.fontFamily = 'monospace';
            errLoc.style.fontSize = '11px';
            errLoc.style.color = '#64748b';
            errLoc.innerText = 'Source: ' + errData.filename + ' (Line ' + errData.lineno + ', Col ' + errData.colno + ')';
            errBox.appendChild(errLoc);
          }

          if (errData.stack) {
            var errStack = document.createElement('pre');
            errStack.style.margin = '12px 0 0 0';
            errStack.style.padding = '8px';
            errStack.style.backgroundColor = '#1e293b';
            errStack.style.color = '#cbd5e1';
            errStack.style.fontFamily = 'monospace';
            errStack.style.fontSize = '12px';
            errStack.style.overflowX = 'auto';
            errStack.style.borderRadius = '4px';
            errStack.style.maxHeight = '200px';
            errStack.style.whiteSpace = 'pre-wrap';
            errStack.innerText = errData.stack;
            errBox.appendChild(errStack);
          } else if (errData.message === 'Script error.') {
            var sandboxTip = document.createElement('p');
            sandboxTip.style.margin = '8px 0 0 0';
            sandboxTip.style.fontSize = '12px';
            sandboxTip.style.lineHeight = '1.5';
            sandboxTip.style.color = '#fbbf24';
            sandboxTip.innerHTML = '<strong>Iframe Sandbox Note:</strong> The browser has hidden the error details to protect cross-origin resources. This constraint is bypassed completely by opening the app directly in a full new tab.';
            errBox.appendChild(sandboxTip);
          }
          card.appendChild(errBox);

          // Help / Instructions
          var helperSec = document.createElement('div');
          helperSec.style.borderTop = '1px solid #334155';
          helperSec.style.paddingTop = '16px';
          helperSec.style.marginBottom = '28px';

          var helpTitle = document.createElement('div');
          helpTitle.style.fontSize = '13px';
          helpTitle.style.fontWeight = '600';
          helpTitle.style.color = '#e2e8f0';
          helpTitle.style.marginBottom = '6px';
          helpTitle.innerText = 'Suggestions to resolve this error:';
          helperSec.appendChild(helpTitle);

          var helpList = document.createElement('ul');
          helpList.style.margin = '0';
          helpList.style.paddingLeft = '20px';
          helpList.style.fontSize = '12px';
          helpList.style.color = '#94a3b8';
          helpList.style.lineHeight = '1.7';

          var liTab = document.createElement('li');
          liTab.innerHTML = '<strong>Open in New Tab:</strong> Click the "Open App" or diagonal arrow button in the top-right of the preview interface to load the application directly.';
          helpList.appendChild(liTab);

          var liWipe = document.createElement('li');
          liWipe.innerHTML = '<strong>Wipe Sandbox State:</strong> If some cached storage item is corrupted, click "Clear Storage & Restart" below to load with factory settings.';
          helpList.appendChild(liWipe);

          helperSec.appendChild(helpList);
          card.appendChild(helperSec);

          // Buttons Row
          var btnRow = document.createElement('div');
          btnRow.style.display = 'flex';
          btnRow.style.gap = '12px';
          btnRow.style.flexWrap = 'wrap';

          var btnReload = document.createElement('button');
          btnReload.innerText = 'Reload Page';
          btnReload.style.backgroundColor = '#3b82f6';
          btnReload.style.color = '#ffffff';
          btnReload.style.border = 'none';
          btnReload.style.borderRadius = '6px';
          btnReload.style.padding = '10px 16px';
          btnReload.style.fontSize = '13px';
          btnReload.style.fontWeight = '600';
          btnReload.style.cursor = 'pointer';
          btnReload.onclick = function() { window.location.reload(); };
          btnRow.appendChild(btnReload);

          var btnClear = document.createElement('button');
          btnClear.innerText = 'Clear Storage & Restart';
          btnClear.style.backgroundColor = '#475569';
          btnClear.style.color = '#ffffff';
          btnClear.style.border = 'none';
          btnClear.style.borderRadius = '6px';
          btnClear.style.padding = '10px 16px';
          btnClear.style.fontSize = '13px';
          btnClear.style.fontWeight = '600';
          btnClear.style.cursor = 'pointer';
          btnClear.onclick = function() {
            try {
              window.localStorage.clear();
              window.sessionStorage.clear();
              // Try cookie clearing if allowed
              var cookies = document.cookie.split(";");
              for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i];
                var eqPos = cookie.indexOf("=");
                var name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT";
              }
            } catch (e) {}
            window.location.reload();
          };
          btnRow.appendChild(btnClear);

          var btnTab = document.createElement('button');
          btnTab.innerText = 'Launch Independent Tab';
          btnTab.style.backgroundColor = '#059669';
          btnTab.style.color = '#ffffff';
          btnTab.style.border = 'none';
          btnTab.style.borderRadius = '6px';
          btnTab.style.padding = '10px 16px';
          btnTab.style.fontSize = '13px';
          btnTab.style.fontWeight = '600';
          btnTab.style.cursor = 'pointer';
          btnTab.onclick = function() {
            window.open(window.location.href, '_blank');
          };
          btnRow.appendChild(btnTab);

          card.appendChild(btnRow);
          overlay.appendChild(card);
          document.body.appendChild(overlay);
        }

        // Register top-level error capture ASAP
        window.addEventListener('error', function(event) {
          var msg = (event.message || '').toString().toLowerCase();
          var errStack = (event.error && event.error.stack || '').toString().toLowerCase();
          var errMsg = (event.error && event.error.message || '').toString().toLowerCase();

          if (msg.indexOf('script error') > -1 || errMsg.indexOf('script error') > -1 || errStack.indexOf('script error') > -1) {
            // Anonymous external tracking script or cross-origin extension issue. Ignore completely.
            try { event.preventDefault(); } catch(e) {}
            try { event.stopPropagation(); } catch(e) {}
            try { event.stopImmediatePropagation(); } catch(e) {}
            return;
          }

          var isInternal = false;
          if (event.filename) {
            var f = event.filename.toLowerCase();
            var origin = window.location.origin.toLowerCase();
            if (
              f.indexOf('src/') > -1 || 
              f.indexOf(origin) > -1 || 
              f.indexOf('localhost') > -1 || 
              f.indexOf('127.0.0.1') > -1 || 
              f.indexOf('main.tsx') > -1 || 
              f.indexOf('/assets/') > -1
            ) {
              isInternal = true;
            }
          } else if (errStack) {
            isInternal = (
              errStack.indexOf('src/') > -1 ||
              errStack.indexOf('main.tsx') > -1 ||
              errStack.indexOf('localhost') > -1 ||
              errStack.indexOf('127.0.0.1') > -1
            );
          }

          if (!isInternal) {
            try { event.preventDefault(); } catch(e) {}
            try { event.stopPropagation(); } catch(e) {}
            try { event.stopImmediatePropagation(); } catch(e) {}
            return;
          }

          var errData = {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
            stack: event.error ? event.error.stack : null
          };
          capturedErrors.push(errData);
          console.error("GLOBAL RUNTIME EXCEPTION DETECTED:", errData);
          
          // Wait for DOM to load if needed
          if (document.body) {
            showDiagnosticOverlay(errData);
          } else {
            window.addEventListener('DOMContentLoaded', function() {
              showDiagnosticOverlay(errData);
            });
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason || {};
          var stack = (reason.stack || '').toString().toLowerCase();
          var message = (reason.message || reason || '').toString().toLowerCase();
          
          if (message.indexOf('script error') > -1 || stack.indexOf('script error') > -1) {
            try { event.preventDefault(); } catch(e) {}
            try { event.stopPropagation(); } catch(e) {}
            try { event.stopImmediatePropagation(); } catch(e) {}
            return;
          }

          var isInternal = false;
          if (stack) {
            if (stack.indexOf('src/') > -1 || stack.indexOf('main.tsx') > -1 || stack.indexOf('localhost') > -1 || stack.indexOf('127.0.0.1') > -1) {
              isInternal = true;
            }
          }
          
          if (!isInternal) {
            try { event.preventDefault(); } catch(e) {}
            try { event.stopPropagation(); } catch(e) {}
            try { event.stopImmediatePropagation(); } catch(e) {}
            return;
          }

          var errData = {
            message: message || 'Unhandled Promise Rejection',
            stack: stack || null
          };
          capturedErrors.push(errData);
          console.error("UNHANDLED PROMISE REJECTION:", errData);
          
          if (document.body) {
            showDiagnosticOverlay(errData);
          } else {
            window.addEventListener('DOMContentLoaded', function() {
              showDiagnosticOverlay(errData);
            });
          }
        }, true);

        // Fail-safe checker: if nothing is rendered in #root after 25 seconds,
        // it means we probably hit a silent evaluation crash or loop.
        window.addEventListener('load', function() {
          setTimeout(function() {
            var root = document.getElementById('root');
            var overlay = document.getElementById('diagnostic-crash-overlay');
            if (root && root.innerHTML.trim() === '' && !overlay) {
              console.warn("Application failed to render into #root after 25 seconds. Initiating diagnostics helper...");
              showDiagnosticOverlay({
                message: 'Application failed to mount inside root container (Potential silent error during JS Evaluation).',
                stack: 'No explicit error was caught but the React tree is unrendered. Please open this app in an independent new tab using the buttons below or top-right to inspect logs directly.'
              });
            }
          }, 25000);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
